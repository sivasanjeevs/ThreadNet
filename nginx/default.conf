server {
  listen 80;
  server_name _;

  # User chat UI at /
  location / {
    root /usr/share/nginx/html/user;
    try_files $uri $uri/ /index.html;
    index index.html;
  }

  # Admin UI at /admin/ (no link is added anywhere; it's just reachable by URL)
  location = /admin {
    return 301 /admin/;
  }

  location /admin/ {
    alias /usr/share/nginx/html/admin/;
    try_files $uri $uri/ /usr/share/nginx/html/admin/index.html;
    index index.html;
  }

  # Bridge REST API for admin at /api/*
  location /api/ {
    proxy_pass http://threadnet.railway.internal:3001$request_uri;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location = /api {
    return 301 /api/;
  }

  # Bridge Socket.IO at /socket.io/*
  location /socket.io {
    proxy_pass http://threadnet.railway.internal:3001/socket.io;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
  }

  location /socket.io/ {
    proxy_pass http://threadnet.railway.internal:3001/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_read_timeout 3600;
  }
}

